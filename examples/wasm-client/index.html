<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Zenoh WASM Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Courier New", monospace;
            background: #111;
            color: #0f0;
            padding: 20px;
        }
        h1 { color: #f60; margin-bottom: 10px; }
        #output {
            border: 1px solid #333;
            padding: 10px;
            max-height: 80vh;
            overflow-y: auto;
            background: #0a0a0a;
        }
        #output p {
            margin: 2px 0;
            border-bottom: 1px solid #1a1a1a;
            padding: 2px 0;
        }
    </style>
</head>
<body>
    <h1>Zenoh WASM Client (Web Worker)</h1>
    <div id="output"><p>Loading WASM module...</p></div>
    <script src="./pkg/zenoh_wasm_client_example.js"></script>
    <script>
        async function run() {
            await wasm_bindgen('./pkg/zenoh_wasm_client_example_bg.wasm');
            wasm_bindgen.start_main();
        }
        run().catch(e => {
            document.getElementById('output').innerHTML += '<p>INIT ERROR: ' + e + '</p>';
        });
    </script>
</body>
</html>
